<!-- Scroll Progress Bar -->
<div
  class="fixed top-0 left-0 h-[2px] z-[9999] transition-all duration-100"
  [style.width]="scrollProgress() + '%'"
  style="background: linear-gradient(90deg, #6366f1, #22d3ee)"
></div>

<nav class="fixed top-[2px] left-0 w-full z-50 transition-all duration-500"
     [class]="scrolled() ? 'bg-[#05070d]/90 backdrop-blur-2xl border-b border-white/10 shadow-2xl' : 'bg-transparent'">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

    <a href="#home" class="text-xl font-bold gradient-text font-syne">Abdallah.</a>

    <ul class="hidden md:flex items-center gap-8 text-sm text-gray-400">
      <li><a href="#about"    class="nav-link">About</a></li>
      <li><a href="#skills"   class="nav-link">Skills</a></li>
      <li><a href="#projects" class="nav-link">Projects</a></li>
      <li><a href="#cv"       class="nav-link">CV</a></li>
      <li><a href="#contact"  class="nav-link">Contact</a></li>
    </ul>

    <a href="mailto:leaderabdallah20@gmail.com"
       class="hidden md:inline-flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-semibold text-white btn-glow">
      Hire Me →
    </a>

    <button class="md:hidden flex flex-col gap-[5px] p-1" (click)="toggleMenu()">
      <span class="w-6 h-[2px] bg-gray-300 rounded"></span>
      <span class="w-6 h-[2px] bg-gray-300 rounded"></span>
      <span class="w-6 h-[2px] bg-gray-300 rounded"></span>
    </button>
  </div>

  @if (menuOpen()) {
    <div class="md:hidden bg-[#05070d]/98 border-b border-white/10 backdrop-blur-xl px-6 py-4 flex flex-col gap-1">
      <a href="#about"    class="mobile-link" (click)="closeMenu()">About</a>
      <a href="#skills"   class="mobile-link" (click)="closeMenu()">Skills</a>
      <a href="#projects" class="mobile-link" (click)="closeMenu()">Projects</a>
      <a href="#cv"       class="mobile-link" (click)="closeMenu()">CV</a>
      <a href="#contact"  class="mobile-link" (click)="closeMenu()">Contact</a>
      <a href="mailto:leaderabdallah20@gmail.com" class="mt-3 btn-glow text-center text-sm py-3 rounded-xl">Hire Me →</a>
    </div>
  }
</nav>
