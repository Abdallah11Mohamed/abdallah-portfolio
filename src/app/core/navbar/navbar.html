<!-- Scroll Progress -->
<div
  class="fixed top-0 left-0 h-[3px] z-[9999] transition-all duration-150"
  [style.width]="scrollProgress() + '%'"
  style="background: linear-gradient(90deg, #0891b2, #06b6d4)">
</div>

<!-- Navbar -->
<nav
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300"
  [class]="scrolled()
    ? 'bg-white/80 backdrop-blur-xl border-b border-gray-200 shadow-sm'
    : 'bg-transparent'">

  <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

    <!-- Logo -->
    <a
      href="#home"
      class="text-2xl font-bold tracking-tight text-gray-900">

      Abdallah<span class="text-cyan-600">.</span>

    </a>

    <!-- Desktop Links -->

    
    <ul
      class="hidden md:flex items-center gap-10 text-base font-medium text-gray-500">
           <li>
        <a href="#services"
           class="hover:text-cyan-600 transition">
          services
        </a>
      </li>

      <li>
        <a href="#about"
           class="hover:text-cyan-600 transition">
          About
        </a>
      </li>

      <li>
        <a href="#skills"
           class="hover:text-cyan-600 transition">
          Skills
        </a>
      </li>

      <li>
        <a href="#projects"
           class="hover:text-cyan-600 transition">
          Projects
        </a>
      </li>

      <li>
        <a href="#cv"
           class="hover:text-cyan-600 transition">
          CV
        </a>
      </li>

      <li>
        <a href="#contact"
           class="hover:text-cyan-600 transition">
          Contact
        </a>
      </li>

    </ul>

    <!-- Right Buttons -->
    <div class="hidden md:flex items-center gap-3">

      <!-- GitHub -->
      <a
        href="https://github.com/Abdallah11Mohamed"
        target="_blank"
        class="w-11 h-11 rounded-xl border border-gray-200 bg-white flex items-center justify-center hover:bg-gray-100 transition">

        <i class="fa-brands fa-github text-lg text-gray-700"></i>

      </a>

      <!-- LinkedIn -->
      <a
        href="https://www.linkedin.com/in/abdallah-mohamed-5814772a5"
        target="_blank"
        class="w-11 h-11 rounded-xl border border-gray-200 bg-white flex items-center justify-center hover:bg-gray-100 transition">

        <i class="fa-brands fa-linkedin-in text-lg text-gray-700"></i>

      </a>

<a
  href="#contact"
  class="hidden md:inline-flex items-center justify-center px-6 py-3 rounded-2xl bg-cyan-600 text-white font-semibold hover:bg-cyan-700 hover:-translate-y-0.5 transition-all duration-300 shadow-md hover:shadow-lg">
  Contact Me
</a>
    </div>

    <!-- Mobile Menu Button -->
    <button
      class="md:hidden flex flex-col gap-[5px]"
      (click)="toggleMenu()">

      <span class="w-6 h-[2px] bg-gray-800 rounded"></span>
      <span class="w-6 h-[2px] bg-gray-800 rounded"></span>
      <span class="w-6 h-[2px] bg-gray-800 rounded"></span>

    </button>

  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {

    <div
      class="md:hidden bg-white border-t border-gray-200 px-6 py-6 flex flex-col gap-3 shadow-xl">
      
      <a
        href="#services"
        class="mobile-link"
        (click)="closeMenu()">

        services

      </a>

      <a
        href="#about"
        class="mobile-link"
        (click)="closeMenu()">

        About

      </a>

      <a
        href="#skills"
        class="mobile-link"
        (click)="closeMenu()">

        Skills

      </a>

      <a
        href="#projects"
        class="mobile-link"
        (click)="closeMenu()">

        Projects

      </a>

      <a
        href="#cv"
        class="mobile-link"
        (click)="closeMenu()">

        CV

      </a>

      <a
        href="#contact"
        class="mobile-link"
        (click)="closeMenu()">

        Contact

      </a>

      <!-- Mobile Socials -->
      <div class="flex items-center gap-3 mt-4">

        <a
          href="https://www.facebook.com/share/1H8jc56usV/"
          target="_blank"
          class="w-11 h-11 rounded-xl border border-gray-200 bg-gray-50 flex items-center justify-center">

          <i class="fa-brands fa-facebook-f text-gray-700"></i>

        </a>

        <a
          href="https://wa.me/201272320465"
          target="_blank"
          class="w-11 h-11 rounded-xl border border-gray-200 bg-gray-50 flex items-center justify-center">

          <i class="fa-brands fa-whatsapp text-gray-700"></i>

        </a>

      </div>

    </div>

  }

</nav>
