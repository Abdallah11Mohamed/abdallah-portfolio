<section id="skills" class="py-24 bg-[#f8fafc] border-t border-gray-200">

  <div class="max-w-7xl mx-auto px-6">

    <div class="text-center mb-16">

      <p class="text-cyan-600 font-medium mb-4">
        Skills & Tools
      </p>

      <h2 class="text-4xl md:text-5xl font-bold text-[#111827] mb-6">
        Technologies I Work With
      </h2>

      <p class="text-lg text-gray-600 max-w-2xl mx-auto">
        Technologies, tools and workflows used in building modern frontend applications.
      </p>

    </div>

    <div class="grid md:grid-cols-2 gap-6">

      @for(category of categories; track category.title){

      <div
        class="bg-white border border-gray-200 rounded-3xl p-8 hover:border-cyan-400 hover:shadow-lg transition">

        <div class="flex items-center gap-3 mb-6">

          <span class="text-3xl">
            {{ category.icon }}
          </span>

          <h3 class="text-2xl font-semibold text-[#111827]">
            {{ category.title }}
          </h3>

        </div>

        <div class="flex flex-wrap gap-3">

          @for(skill of category.skills; track skill){

          <span
            class="px-4 py-2 rounded-full border border-gray-200 bg-gray-50 text-sm text-gray-700 hover:border-cyan-500 hover:text-cyan-600 transition">

            {{ skill }}

          </span>

          }

        </div>

      </div>

      }

    </div>

  </div>

</section>
