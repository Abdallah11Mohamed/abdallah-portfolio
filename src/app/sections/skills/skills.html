<section id="skills" class="py-28 bg-black text-white border-t border-white/10">
  <div class="max-w-7xl mx-auto px-6">

    <div data-aos="fade-up" class="mb-16">
      <p class="section-label">Technical Skills</p>
      <h2 class="section-title">My Toolkit</h2>
      <p class="text-gray-500 mt-4 text-lg max-w-xl">Technologies I use to build scalable, performant, and maintainable web applications.</p>
    </div>

    <div class="grid md:grid-cols-3 gap-8">

      @for (category of categories; track category.title) {
        <div data-aos="zoom-in" class="glass-card rounded-3xl p-8 hover:border-indigo-500/40 hover:-translate-y-1 transition-all duration-300">

          <div class="flex items-center gap-3 mb-7">
            <span class="text-2xl">{{ category.icon }}</span>
            <h3 class="text-xl font-semibold text-white font-syne">{{ category.title }}</h3>
          </div>

          <div class="flex flex-wrap gap-2.5">
            @for (skill of category.skills; track skill) {
              <span class="skill-chip hover:border-indigo-500/50 hover:text-indigo-300 transition-colors cursor-default">
                {{ skill }}
              </span>
            }
          </div>

        </div>
      }

    </div>
  </div>
</section>
