<section
  id="contact"
  class="py-28 bg-[#f8fafc] text-[#111827] border-t border-gray-200">

  <div class="max-w-6xl mx-auto px-6">

    <!-- Header -->
    <div
      data-aos="fade-up"
      class="text-center mb-20">

      <p class="text-cyan-600 font-medium mb-4">
        Contact
      </p>

      <h2 class="text-4xl md:text-5xl font-bold tracking-tight mb-6">
        Let's Connect
      </h2>

      <p
        class="text-lg text-gray-600 max-w-2xl mx-auto leading-8">

        I'm currently looking for Frontend Internship and Junior Angular Developer opportunities.
        Feel free to contact me through any of the platforms below.

      </p>

    </div>

    <!-- Cards -->

    <div
      class="grid md:grid-cols-2 gap-6">

      @for (link of contactLinks; track link.label) {

        <a
          [href]="link.href"
          [target]="link.external ? '_blank' : '_self'"
          class="group bg-white border border-gray-200 rounded-3xl p-6 hover:shadow-lg hover:-translate-y-1 transition-all duration-300">

          <div
            class="flex items-center gap-5">

            <div
              class="w-14 h-14 rounded-2xl bg-cyan-50 flex items-center justify-center text-2xl">

              {{ link.icon }}

            </div>

            <div>

              <div
                class="text-xs uppercase tracking-widest text-gray-400 mb-1">

                {{ link.type }}

              </div>

              <div
                class="font-medium text-[#111827] group-hover:text-cyan-600 transition">

                {{ link.label }}

              </div>

            </div>

          </div>

        </a>

      }

    </div>

    <!-- CTA -->

    <div
      class="mt-16 text-center">

      <a
        href="https://wa.me/201272320465"
        target="_blank"
        class="inline-flex items-center gap-3 px-8 py-4 rounded-2xl bg-green-500 text-white font-medium hover:bg-green-600 transition">

        💬 Chat on WhatsApp

      </a>

    </div>

  </div>

</section>
